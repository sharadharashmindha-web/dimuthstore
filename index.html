<!DOCTYPE html>
<html>
<head>

<style>

body{

<body>

</div>

<footer>

<script>

var phone="94763438136";
var msg="Hello Dimuth Top-Up Store. I want "+item+" Player ID: "+id;
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
